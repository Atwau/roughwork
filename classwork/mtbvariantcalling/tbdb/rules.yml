mmpR5_rule:
  type: epistasisRule
  source:
    gene_name: mmpL5
    type: LoF
  target:
    drug: bedaquiline
    gene_name: mmpR5
  source_inactivation_freq_cutoff: 100
  target_escape_freq_cutoff: 50

eis_rule:
  type: epistasisRule
  source:
    gene_name: eis
    type: LoF
  target:
    drug:
    - kanamycin
    - amikacin
    gene_name: eis
  source_inactivation_freq_cutoff: 100
  target_escape_freq_cutoff: 50
  
canettii_pza_rule:
  type: lineageResistanceRule
  lineage: M.canettii
  drug: pyrazinamide
  note: 'M. canettii is intrinsically resistant to pyrazinamide'


rpoB1346Rule:
  type: SequencingArtefectRule
  gene: rpoB
  gene_position: 1346
  note: 'Changes at position 1346 in codon 449 of rpoB detected with Illumina sequencing, particularly if unfixed, may represent artefacts.'

rpt_rule:
  type: CrossResistanceRule
  source_drug: rifampicin
  target_drug: rifapentine
  note: 'Groups 1–5 classifications for rifampicin also apply to rifapentine'

eto_rule:
  type: CrossResistanceRule
  source_drug: ethionamide
  target_drug: prothionamide
  note: 'Groups 1–5 classifications for ethionamide also apply to prothionamide'

